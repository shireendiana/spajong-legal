<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Spajong</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    background: #FFFFFF;
    color: #2A211C;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px 40px;
  }
  .brand {
    text-align: center;
    margin-bottom: 40px;
  }
  .brand h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 300;
    letter-spacing: 3px;
  }
  .brand p {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2.6px;
    text-transform: uppercase;
    color: #888680;
    margin-top: 8px;
  }
  .card {
    width: 100%;
    max-width: 380px;
  }
  .field { margin-bottom: 20px; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: #888680;
    margin-bottom: 8px;
  }
  .field label.error { color: #9A5949; }
  .field input {
    width: 100%;
    border: none;
    border-bottom: 1px solid #E8E3DC;
    padding: 8px 0;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    color: #2A211C;
    background: transparent;
    outline: none;
    transition: border-color 0.28s;
  }
  .field input:focus { border-bottom-color: #2A211C; }
  .field input.error { border-bottom-color: #9A5949; }
  .field .error-text {
    font-size: 11px;
    color: #9A5949;
    margin-top: 6px;
  }
  .btn {
    width: 100%;
    padding: 12px 28px;
    border: none;
    background: #2A211C;
    color: #FDFAF5;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.78px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.18s;
    margin-top: 20px;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .message {
    text-align: center;
    margin-top: 20px;
  }
  .message.success { color: #7A9E82; }
  .message.error { color: #9A5949; }
  .message p {
    font-size: 14px;
    line-height: 1.6;
  }
  .back-link {
    display: inline-block;
    margin-top: 24px;
    font-size: 14px;
    color: #888680;
    text-decoration: none;
  }
  .icon {
    font-size: 32px;
    color: #888680;
    margin-bottom: 16px;
  }
  .success-card {
    text-align: center;
    padding: 40px 0;
  }
  .success-card h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    margin-bottom: 12px;
  }
  .success-card p {
    font-size: 14px;
    color: #888680;
    line-height: 1.6;
  }
  #loading-state {
    text-align: center;
    padding: 40px 0;
    color: #888680;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="brand">
  <h1>Spajong</h1>
  <p>Relax and play mahjong</p>
</div>

<div class="card">
  <!-- Loading -->
  <div id="loading-state">
    <p>Verifying your reset link…</p>
  </div>

  <!-- Error: invalid/expired link -->
  <div id="error-state" style="display:none;">
    <div class="success-card">
      <div class="icon">⚠</div>
      <h2>Link expired</h2>
      <p>This password reset link is no longer valid. Please request a new one from the app.</p>
    </div>
  </div>

  <!-- Password form -->
  <div id="form-state" style="display:none;">
    <div class="field">
      <label id="pw-label" for="password">New password</label>
      <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password">
      <div class="error-text" id="pw-error" style="display:none;"></div>
    </div>
    <div class="field">
      <label id="confirm-label" for="confirm">Confirm new password</label>
      <input type="password" id="confirm" placeholder="Re-enter your password" autocomplete="new-password">
      <div class="error-text" id="confirm-error" style="display:none;"></div>
    </div>
    <button class="btn" id="submit-btn" disabled onclick="handleSubmit()">Update password</button>
    <div class="message error" id="submit-error" style="display:none;"><p></p></div>
  </div>

  <!-- Success -->
  <div id="success-state" style="display:none;">
    <div class="success-card">
      <div class="icon">✓</div>
      <h2>Password updated</h2>
      <p>Your password has been changed. You can now log in with your new password in the Spajong app.</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://ycipwyljhzctqrevqtis.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljaXB3eWxqaHpjdHFyZXZxdGlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NzMyNTYsImV4cCI6MjA5MzA0OTI1Nn0.m7L05LQwIA9Zg1osrcLe0KOiKd6KVZZ7afEYADukIP4';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const COMMON_PASSWORDS = new Set([
  'password', '123456', '12345678', 'qwerty', 'abc123', 'password1',
  '111111', 'letmein', 'welcome', 'monkey', 'dragon', 'master',
  'login', 'princess', 'football', 'shadow', 'sunshine', 'trustno1',
  'iloveyou', 'spajong'
]);

function show(id) {
  ['loading-state', 'error-state', 'form-state', 'success-state'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}

function validatePassword(pw) {
  if (pw.length < 6) return 'Password must be at least 6 characters';
  if (COMMON_PASSWORDS.has(pw.toLowerCase())) return 'Please choose a stronger password';
  return null;
}

function checkForm() {
  const pw = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const pwErr = validatePassword(pw);
  const confirmErr = confirm.length > 0 && confirm !== pw ? "Passwords don't match" : null;

  const pwErrEl = document.getElementById('pw-error');
  const confirmErrEl = document.getElementById('confirm-error');
  const pwLabel = document.getElementById('pw-label');
  const confirmLabel = document.getElementById('confirm-label');
  const pwInput = document.getElementById('password');
  const confirmInput = document.getElementById('confirm');

  if (pw.length > 0 && pwErr) {
    pwErrEl.textContent = pwErr;
    pwErrEl.style.display = 'block';
    pwLabel.classList.add('error');
    pwInput.classList.add('error');
  } else {
    pwErrEl.style.display = 'none';
    pwLabel.classList.remove('error');
    pwInput.classList.remove('error');
  }

  if (confirmErr) {
    confirmErrEl.textContent = confirmErr;
    confirmErrEl.style.display = 'block';
    confirmLabel.classList.add('error');
    confirmInput.classList.add('error');
  } else {
    confirmErrEl.style.display = 'none';
    confirmLabel.classList.remove('error');
    confirmInput.classList.remove('error');
  }

  document.getElementById('submit-btn').disabled =
    pw.length === 0 || confirm.length === 0 || pwErr !== null || confirmErr !== null;
}

document.getElementById('password').addEventListener('input', checkForm);
document.getElementById('confirm').addEventListener('input', checkForm);

async function handleSubmit() {
  const btn = document.getElementById('submit-btn');
  const errDiv = document.getElementById('submit-error');
  btn.disabled = true;
  btn.textContent = 'Updating…';
  errDiv.style.display = 'none';

  try {
    const { error } = await sb.auth.updateUser({
      password: document.getElementById('password').value
    });
    if (error) throw error;
    show('success-state');
  } catch (e) {
    errDiv.querySelector('p').textContent = e.message || 'Something went wrong. Please try again.';
    errDiv.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Update password';
  }
}

// On load: establish session via token hash (from custom email template)
(async function init() {
  const urlParams = new URLSearchParams(window.location.search);
  const tokenHash = urlParams.get('token_hash');
  const type = urlParams.get('type');

  if (tokenHash && type === 'recovery') {
    try {
      const { error } = await sb.auth.verifyOtp({
        token_hash: tokenHash,
        type: 'recovery'
      });
      if (error) throw error;
      show('form-state');
      return;
    } catch (e) {
      show('error-state');
      return;
    }
  }

  show('error-state');
})();
</script>
</body>
</html>
